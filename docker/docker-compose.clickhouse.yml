# DepthMark - ClickHouse only Docker Compose
# Standalone database service without scraper/scheduler containers
# Local development only: do not use this compose file as a production manifest.

name: depthmark-clickhouse

services:
  depthmark-clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: depthmark-clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native TCP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    environment:
      DEPTHMARK_ENV: ${DEPTHMARK_ENV:-local}
      CLICKHOUSE_DB: fotmob
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-fotmob_user}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-fotmob_pass}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
